[tools]
shellcheck = "latest"
pre-commit = {version = "latest", postinstall = "pre-commit install"}
bats = "latest"

[hooks]
postinstall="mise run sync-core"

[tasks.test]
description = "Run unit and integration tests"
run = [
    { task="test:unit"},
    { task="test:integration"},
]

[tasks."test:unit"]
description = "Run unit tests"
run = "bats tests/unit"

[tasks."test:integration"]
description = "Run integration tests"
run = "bats tests/integration"
