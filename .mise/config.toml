[tools]
shellcheck = "latest"
pre-commit = {version = "latest", postinstall = "pre-commit install"}
bats = "latest"
uv = "latest"
ty = "latest"
ruff = "latest"

[env]
_.python.venv = { path = ".venv" }

[hooks]
postinstall = ["mise run sync-core", "uv sync"]

[tasks.verify]
description = "Ensure the quality of the project"
run = [
    { task="typecheck"},
    { task="format"},
    { task="lint"},
    { task="test"},
]

[tasks.test]
description = "Run unit, integration and mechanism tests"
run = [
    { task="test:unit"},
    { task="test:integration"},
    { task="test:mechanism"},
]

[tasks."test:unit"]
description = "Run unit tests"
run = "uv run pytest -m unit -q"

[tasks."test:integration"]
description = "Run integration tests"
run = "uv run pytest -m integration -q"

[tasks."test:mechanism"]
description = "Run mechanism tests (no AI calls)"
run = "uv run pytest -m mechanism -q"

[tasks."test:e2e"]
description = "Run E2E full workflow tests"
env = { "E2E_CONFIRM" = "1" }
run = "uv run pytest -m e2e -q"

[tasks.lint]
description = "Lint Python files with ruff"
run = "ruff check --fix -q bin/openspec-extended resources/opencode/scripts/osx-orchestrate resources/opencode/scripts/lib/osx .mise/tasks/version/check .mise/tasks/version/update .mise/tasks/version/lib/"

[tasks.format]
description = "Format Python files with ruff"
run = "ruff format -q bin/openspec-extended resources/opencode/scripts/osx-orchestrate"

[tasks."typecheck"]
description = "Type check Python files with ty"
run = "ty check bin/openspec-extended resources/opencode/scripts/osx-orchestrate resources/opencode/scripts/lib/osx"
