repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: mise exec -- shellcheck -s bash --rcfile=.shellcheckrc
        language: system
        types: [shell]
        files: ^(bin/openspecx|\.mise/tasks/)

      - id: check-version-bump
        name: Check version bump in versioned files
        entry: mise run version:check
        language: system
        files: ^(resources/(opencode|claude)/(skills/.*/(SKILL\.md|references/.*\.md)|agents/.*\.md|commands/.*\.md|scripts/(openspec-auto|lib/osc-.*))|install\.sh|bin/openspecx)$
        pass_filenames: false

      - id: test
        name: Test the openspec-auto script and its dependencies
        entry: mise run test
        language: system
        files: ^(resources/opencode/scripts/|tests/)
        pass_filenames: false
