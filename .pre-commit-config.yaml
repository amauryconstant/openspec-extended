repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: mise exec -- shellcheck -s bash --rcfile=.shellcheckrc
        language: system
        types: [shell]
        files: ^(bin/openspecx|\.mise/tasks/)

      - id: check-version-bump
        name: Check version bump in versioned files
        entry: mise run version:check
        language: system
        files: ^resources/(.*/SKILL\.md|claude/commands/opsx/.*\.md|opencode/commands/(opsx-.*|openspec-phase.*)\.md|.*/scripts/openspec-auto|.*/scripts/lib/(MANIFEST\.json|osc-.*)|.*/agents/.*\.md)$
        pass_filenames: false

      - id: test
        name: Test the openspec-auto script and its dependencies
        entry: mise run test
        language: system
        files: ^resources/opencode/scripts/$
        pass_filenames: false
